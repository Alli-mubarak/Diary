<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Diary</title>
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav>
  <h1><a href="/">Diary</a>
  <div class="tt">
   <div class="theme">
       <i class="fa-solid fa-moon"></i>
   </div>
  <div class="toggle hidden">
      <div></div>
      <div></div>
  </div>
     <div id="search" class="hidden"><i class="fa-solid fa-magnifying-glass"></i></div>
    <form id="search-form">
      <input type="text" placeholder="Search for entry..." name="search" id="search-input" maxlength="15" />
      <button type="submit" id="search-btn">•Go•</button>
    </form>
      <button id="sign-in-btn" type="button" class="hidden">
        <a href="/sign-in" >Sign In</a>
      </button>
    <img src="user.png" alt="default user image" id="user-image" class="default-user"/>

  </div>
  </div>
  </h1>
  
  <form class="input-box" id="inputBox">
  <textarea id="entry" type="text" placeholder="Write something..."name="description"></textarea>
  <button id="add-button" type="submit">Add Entry</button>
  </form>
  </nav>
  <div id="auth-section" class="hidden">
    <div id='closer'>x</div>
    <p>Loading user status...</p>
  </div>
  <div id="entries">
    <p class="loader"></p>
    <p class="loader"></p>
    <p class="loader"></p>
    <p class="loader"></p>
    <p class="loader"></p>
    <p class="loader"></p>
     <p class="loader"></p>
  </div>
    <div id="error-box" class="hidden">
    <p>Sorry, no match was not found!. Try another word </p>
    </div>
  <script src="scripts/script.js"></script>
</body>
</html>
