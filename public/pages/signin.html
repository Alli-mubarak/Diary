<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diary - Sign Up</title>
  <link rel="stylesheet" href="css/signin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav>
  <h1><a href="/">Diary</a>
  <div class="tt">
   <div class="theme">
       <i class="fa-solid fa-moon"></i>
   </div>
  </div>
  </h1>
 <form id="sign-in-form">
        <h2>Sign In with Email</h2>
        <p>Or</p>
        <a href="/auth/google" id="google-login">Continue with Google
        <img src="images/google-icon.png" alt="google-logo"/></a>
        
        <div class="input-group">
        <label for="email">Email</label>
        <input id="email" placeholder="Enter Email Adress.." type="email" required>
        <span id="email-msg"></span>
        </div>
        <div class="input-group">
        <label for="password">Password</label>
        <input id="password" placeholder="********" type="password" required>
        <span id="pwd-msg"></span>
        </div>
        <div>
        <p>Don't have an account? <a href="/sign-up">Sign Up</a></p>
        </div>
        <button type="submit">
            Sign In
        </button>
        
    </form>
  
  <script src="scripts/signin.js"></script>
</body>
</html>
