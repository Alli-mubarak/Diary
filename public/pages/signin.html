<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diary - Sign Up</title>
  <link rel="stylesheet" href="css/signin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav>
  <header><a href="/">Diary</a>
  <div class="tt">
   <div class="theme">
       <i class="fa-solid fa-moon"></i>
   </div>
  </div>
  </header>
    </nav>
  <main>
 <form id="sign-in-form">
   <a href="/auth/google" id="google-login">Sign In with Google
        <img src="images/google-icon.png" alt="google-logo"/></a>
   <p>Or</p>
    <h2>Sign In with Email</h2>
        <div class="input-group">
        <label for="email">Email</label>
        <input id="email" placeholder="Enter Email Adress.." name="email" type="email" required>
        <span id="email-msg"></span>
        </div>
        <div class="input-group">
        <label for="password">Password</label>
        <input id="password" placeholder="********" type="password" name="password" required>
        <i class="fa-solid fa-eye revealer" onclick="revealPassword()"></i>
        <span id="pwd-msg"></span>
        </div>
       <div id="form-message"></div>
       <button type="submit">
            Sign In
       </button>
        <div>
        <p>Don't have an account? <a href="/sign-up">Sign Up</a></p>
        </div>
    </form>
  </main>
  <footer>
    <p>App is still in development.</p>
    <p>Please don't hesitate to contact <a href="https://portfolio-red-rho-44.vercel.app/" target="_blamk">developer</a> for any complaints or suggestions.</p>
  </footer>
  <script src="scripts/signin.js"></script>
</body>
</html>
