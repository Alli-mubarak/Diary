
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diary</title>
  <style>
     html{
         --pC : #005;
         --bgC : #fff;
         --txtC: #000;
         --btC: #fff;
         --entC: rgba(0,0,0,0.045);
     }
     html.dark{
         --pC : #fff;
         --bgC : #002;
         --btC: #005;
         --txtC: #fff;
         --entC: rgba(255, 255, 255, 0.1);
     }
    body{
        background: var(--bgC);
    }
      h1{
      margin:5px 0;
          display:flex;
          align-items :center;
          justify-content:space-between;
          border-bottom: 1px solid var(--pC);
          padding-bottom:5px;
          color: var(--txtC)
      }
      .tt{
          display: flex;
          align-items:center;
          justify-content: space-between;
          gap:30px;
      }
      .theme{
          width: 30px; height:30px;
          cursor: pointer;
          position:relative;
          border-radius:50%;
          transition:.25s ease;
          background:#fff054;
          box-shadow:-2px 0 1px #fff055;
          transform: rotate(-25deg);
          overflow:hidden;
      }
      .t-inner{
          width:94%; height:94%;
          top:3%;
          position: absolute;
          background: #fff;
         left:6px;
          border-radius:inherit;
          transition:0.25s ease;
      }
     
      .toggle{
          width: 30px; height:30px;
          cursor: pointer;
          position:relative;
          border-radius:50%;
          transition:.25s ease;
          padding:5px;
      }
      .toggle:hover{
          background: var(--entC);
      }
      .toggle div{
          position: absolute;
          background:var(--pC);
          width:30px; height:2px;
          top:19px;
          border-radius:20px;
      }
      .toggle div:nth-child(2){
          transform: rotate(90deg);
      }
      .input-box{
          display: flex;
          justify-content:space-between;
          align-items:end;
          height:0;
          overflow:hidden;
          
          transition:0.5s ease;
      }
      .input-box *{
          display:block;
          padding:5px;
          font-size:18px;
      }
      b{
          display:block;
          font-size:20px;
          margin:0 0 10px 0;
      }
      button, #add-button{
          padding:7px 10px;
          border-radius:5px;
          font-size:18px;
          border:1px solid var(--pC);
          background: var(--pC);
          
      }
      .edit{
          color:var(--pC);
          border:2px solid var(--pC);
          background :var(--bgC);
      }
      .delete, #add-button{
          color:var(--btC);
          background:var(--pC);
      }
      #entry{
          width:75%;
          resize:none;
          background:var(--bgC);
          color: var(--txtC);
          outline: 1px solid var(--pC);
      }
      #entry::placeholder {
          color: var(--pC);
      }
      .highlight{
      background: var(--bgC);
          text-decoration: underline;
          padding:0 5px;
      }
      .timeAdded{
      display:block;
      margin-left:auto;
      margin-top:-20px;
      width:fit-content;
      background:var(--bgC);
      padding:3px;
      color:var(--pC);
      }
      #entries p{
      padding: 10px;
      background: var(--entC);
      color: var(--txtC);
      }
  </style>
</head>
<body>
    <nav>
  <h1>My Diary 
  <div class="tt">
   <div class="theme">
       <div class="t-inner"></div>
   </div>
  <div class="toggle">
      <div></div>
      <div></div>
  </div>
  </div>
  </h1>
  
  <form class="input-box" id="inputBox">
  <textarea id="entry" type="text" placeholder="Write something..."name="description"></textarea>
  <button id="add-button" type="submit">Add Entry</button>
  </form>
  </nav>
  <div id="entries"></div>
  <script src="script.js"></script>
</body>
</html>
